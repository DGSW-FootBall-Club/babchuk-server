name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # [중요] 3. Gradle 캐시 단계 삭제 (범인 처단)
      # 캐시가 꼬였을 때는 아예 안 쓰는 게 가장 확실합니다.

      # 4. Spring Boot 빌드 (캐시 없이 클린하게)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          # --no-daemon: 백그라운드 프로세스 없이 깨끗하게 빌드
          ./gradlew clean bootJar -x test --no-daemon

      # 5. Docker Build & Push
      - name: Docker Build & Push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          # 빌드 캐시를 사용하지 않도록 --no-cache 옵션 추가
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}

      # 6. EC2 배포
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/babchuk-server
            # 서버에서도 최신 이미지를 강제로 pull
            sudo docker compose pull
            sudo docker compose up -d --force-recreate --remove-orphans
            sudo docker image prune -f