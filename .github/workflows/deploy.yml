name: Deploy to Server

on:
  push:
    branches:
      - main   # main 브랜치 push 시 자동 배포
  workflow_dispatch:   # GitHub에서 수동 실행 가능

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1 GitHub 저장소 코드 가져오기
      - uses: actions/checkout@v4

      # 2 Java 21 설치 (Spring Boot 빌드용)
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3 Gradle 캐시 (빌드 속도 향상)
      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4 Spring Boot 빌드
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test   # 테스트 제외하고 jar 생성

      # 5 Docker 이미지 빌드 후 Docker Hub 업로드
      - name: Docker Build & Push
        run: |
          # Docker Hub 로그인
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

          # Docker 이미지 빌드
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }} .

          # Docker Hub에 이미지 업로드
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}

      # 6 EC2 서버 접속 후 배포 실행
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}        # EC2 Public IP
          username: ${{ secrets.SSH_USERNAME }} # ubuntu
          key: ${{ secrets.SSH_KEY }}          # EC2 pem key
          port: ${{ secrets.SSH_PORT }}        # 보통 22
          script: |
            # 프로젝트 폴더 이동
            cd ~/babchuk-server

            # 기존 컨테이너 삭제 (없으면 무시)
            docker rm -f $(docker ps -qa) || true

            # 최신 Docker 이미지 다운로드
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}

            # docker-compose 실행 (컨테이너 재생성)
            docker compose up -d

            # 사용 안하는 Docker 이미지 정리 (디스크 절약)
            docker image prune -f