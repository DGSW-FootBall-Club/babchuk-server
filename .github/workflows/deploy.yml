name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. 코드 가져오기
      - uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 캐시
      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 4. Spring Boot 빌드
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      # 5. Docker Build & Push
      - name: Docker Build & Push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}

      # 6. EC2 배포 (이 부분을 교체하세요)
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/babchuk-server

            # 1. 최신 이미지 강제 다운로드
            # 서버 환경에 따라 docker-compose 또는 docker compose 선택
            sudo docker-compose pull || sudo docker compose pull

            # 2. 컨테이너 재시작 (중요 옵션들 추가)
            # --force-recreate: 이미지가 같아도 컨테이너를 무조건 새로 만듦
            # --remove-orphans: 설정에서 빠진 옛날 컨테이너는 삭제
            sudo docker-compose up -d --force-recreate --remove-orphans || \
            sudo docker compose up -d --force-recreate --remove-orphans

            # 3. 사용 안 하는 이미지(예전 버전) 정리
            sudo docker image prune -f