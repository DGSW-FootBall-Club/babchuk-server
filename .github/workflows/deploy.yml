name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Spring Boot 빌드 (캐시 없이 클린하게)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          # --no-daemon: 백그라운드 프로세스 없이 깨끗하게 빌드
          ./gradlew clean bootJar -x test --no-daemon

      # 4. Docker Build & Push
      - name: Docker Build & Push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          # 빌드 캐시를 사용하지 않도록 --no-cache 옵션 추가
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}

      # 5. EC2 배포
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
              cd ~/babchuk-server
              # 1. 서버에 있는 이미지를 강제로 지워버립니다 (이러면 무조건 새로 받아야 함)
              sudo docker compose down
              sudo docker rmi -f ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:latest
              
              # 2. 최신 이미지를 다시 다운로드
              sudo docker compose pull
              
              # 3. 컨테이너 실행
              sudo docker compose up -d